name: Crash / Bug report
description: Create a report to help us improve
title: "[BUG] Repo: "
labels: [bug, backend]
body:
  - type: textarea
    id: bug-description
    attributes:
      label: "Describe the crash or bug"
      description: A clear and concise description of what the bug is, or what you may think is causing crashing.
      placeholder: What's happening? What did you expect to happen? What did you notice?
    validations:
      required: true
  - type: input
    id: file
    attributes:
      label: "File"
      description: Please provide the name or link to the bugged file.
      placeholder: Link to file
    validations:
      required: true
  - type: textarea
    id: additional-info
    attributes:
      label: "Additional Information"
    validations:
      required: false
  - type: checkboxes
    id: pre-checks
    attributes:
      label: "Pre-submission Checks"
      description: Please confirm the following before submitting.
      options:
        - label: I have searched existing issues and confirmed this bug has not been reported before.
          required: true
        - label: I have checked the known issues and confirmed this is not a known limitation or planned fix.
          required: true
